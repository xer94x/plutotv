<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlutoTV Player</title>

<script>

const APP_VER = "9.20.0-89258290264838515e264f5b051b7c1602a58482";
const BOOT    = "https://boot.pluto.tv/v4/start";
const STITCH  = "https://cfd-v4-service-channel-stitcher-use1-1.prd.pluto.tv/v2/stitch";

const CORS_PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

let session = null;

function uuidv4(){
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>
  (c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16))
}

function fetchWithTimeout(url,ms=7000){
  const ctrl=new AbortController()
  const timer=setTimeout(()=>ctrl.abort(),ms)
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(timer))
}

async function boot(){

  const clientID=uuidv4()
  const sessionID=uuidv4()

  const p=new URLSearchParams({

    appName:"web",

    AppVersion:APP_VER,
    ClientID:clientID,
    ClientModelNumber:"1.0.0",

    country:"IT",
    deviceDNT:"false",

    deviceId:clientID,
    deviceLat:"37.31",
    deviceLon:"15.14",

    deviceMake:"chrome",
    deviceModel:"web",
    deviceType:"web",
    deviceVersion:"138.0.0",

    marketingRegion:"IT",
    serverSideAds:"false",

    sessionID:sessionID,
    userId:""
  })

  const directUrl=`${BOOT}?${p}`

  try{

    const res=await fetchWithTimeout(directUrl,4000)

    if(res.ok){

      const data=await res.json()

      const jwt=data.sessionToken||data.jwt||data.token

      if(jwt)return{clientID,sessionID,jwt}

    }

  }catch(_){}

  return await Promise.any(

    CORS_PROXIES.map(proxy=>proxy(directUrl)).map(async url=>{

      const res=await fetchWithTimeout(url,9000)

      if(!res.ok)throw new Error(`HTTP ${res.status}`)

      const data=await res.json()

      const jwt=data.sessionToken||data.jwt||data.token

      if(!jwt)throw new Error("JWT non trovato")

      return{clientID,sessionID,jwt}

    })

  )

}

function buildUrl(chId,type,s){

  const base=type==="dash"
  ?`${STITCH}/dash/channel/${chId}/main.mpd`
  :`${STITCH}/hls/channel/${chId}/master.m3u8`

  const p=new URLSearchParams({

    advertisingId:"",
    appName:"web",
    appVersion:APP_VER,
    app_name:"web",

    clientDeviceType:"0",

    ClientID:s.clientID,

    clientModelNumber:"1.0.0",

    country:"IT",

    deviceDNT:"false",
    deviceId:s.clientID,

    deviceLat:"37.31",
    deviceLon:"15.14",

    deviceMake:"chrome",
    deviceModel:"web",
    deviceType:"web",
    deviceVersion:"138.0.0",

    marketingRegion:"IT",

    serverSideAds:"false",

    sessionID:s.sessionID,
    sid:s.sessionID,

    userId:"",

    jwt:s.jwt,

    masterJWTPassthrough:"true"

  })

  return`${base}?${p}`

}

</script>

</head>
<body>
</body>
</html>
