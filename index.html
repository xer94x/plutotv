<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlutoTV Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:      #0a0a0f;
    --surface: #12121a;
    --card:    #1a1a26;
    --border:  #2a2a3a;
    --accent:  #ff6b00;
    --accent2: #ff9d00;
    --text:    #e8e8f0;
    --muted:   #55556a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #status {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  #status.ok .dot  { background: #44ff88; }
  #status.err .dot { background: #ff4444; }
  #status.loading .dot {
    background: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .top-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #search {
    flex: 1;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  #refresh-btn {
    background: rgba(255,107,0,.15);
    border: 1px solid rgba(255,107,0,.4);
    color: var(--accent);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
  }
  #refresh-btn:hover { background: rgba(255,107,0,.28); }
  #refresh-btn:disabled { opacity: .4; cursor: default; }

  #tip {
    margin: 14px 24px 0;
    padding: 10px 16px;
    background: rgba(255,107,0,.07);
    border: 1px solid rgba(255,107,0,.2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--accent2);
    display: none;
  }
  #tip.show { display: block; }

  #err-banner {
    display: none;
    margin: 14px 24px 0;
    background: rgba(255,50,50,.08);
    border: 1px solid rgba(255,50,50,.25);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    color: #ff8888;
  }
  #err-banner.show { display: block; }

  .content { padding: 24px; }

  .category-section { margin-bottom: 32px; }

  .category-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .ch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .ch-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: background .15s, border-color .15s, transform .1s;
    cursor: pointer;
  }
  .ch-card:hover {
    background: #22223a;
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .ch-card:active { transform: translateY(0); }

  .ch-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
  }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ch-badge {
    font-size: 9px;
    background: var(--border);
    color: var(--muted);
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, #1e1e2e 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 10px;
    height: 52px;
  }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
</style>
</head>

const APP_VER = "9.20.0-89258290264838515e264f5b051b7c1602a58482";
const BOOT    = "https://boot.pluto.tv/v4/start";
const STITCH  = "https://cfd-v4-service-channel-stitcher-use1-1.prd.pluto.tv/v2/stitch";

// Proxy CORS pubblici usati come fallback in sequenza
const CORS_PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://proxy.cors.sh/${url}`,
  url => `https://cors-proxy.fringe.zone/${url}`,
  url => `https://yacdn.org/proxy/${url}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

let session = null;

function uuidv4() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4).toString(16));
}

function fetchWithTimeout(url, ms = 7000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

async function boot() {
  const clientID  = uuidv4();
  const sessionID = uuidv4();
  const clientTime = new Date().toISOString();
  const p = new URLSearchParams({
    appName:"web", appVersion:APP_VER,
    clientID, clientModelNumber:"1.0.0",
    clientTime,
    country:"IT", deviceDNT:"false",
    deviceId:clientID, deviceLat:"37.31", deviceLon:"15.14",
    deviceMake:"chrome", deviceModel:"web", deviceType:"web",
    deviceVersion:"138.0.0", marketingRegion:"IT",
    serverSideAds:"false", sessionID, userId:""
  });
  const directUrl = `${BOOT}?${p}`;

  // Prima tenta diretto (senza proxy)
  try {
    const res = await fetchWithTimeout(directUrl, 4000);
    if (res.ok) {
      const data = await res.json();
      const jwt = data.sessionToken || data.jwt || data.token;
      if (jwt) return { clientID, sessionID, jwt };
    }
  } catch(_) {}

  // Tutti i proxy in parallelo: vince il primo che risponde
  return await Promise.any(
    CORS_PROXIES.map(proxy => proxy(directUrl)).map(async url => {
      const res = await fetchWithTimeout(url, 9000);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const jwt = data.sessionToken || data.jwt || data.token;
      if (!jwt) throw new Error("JWT non trovato");
      return { clientID, sessionID, jwt };
    })
  );
}

function buildUrl(chId, type, s) {
  const base = type === "dash"
    ? `${STITCH}/dash/channel/${chId}/main.mpd`
    : `${STITCH}/hls/channel/${chId}/master.m3u8`;
  const p = new URLSearchParams({
    advertisingId:"", appName:"web", appVersion:APP_VER,
    app_name:"web", clientDeviceType:"0", clientID:s.clientID,
    clientModelNumber:"1.0.0", country:"IT", deviceDNT:"false",
    deviceId:s.clientID, deviceLat:"37.31", deviceLon:"15.14",
    deviceMake:"chrome", deviceModel:"web", deviceType:"web",
    deviceVersion:"138.0.0", marketingRegion:"IT",
    serverSideAds:"false", sessionID:s.sessionID, sid:s.sessionID,
    userId:"", jwt:s.jwt, masterJWTPassthrough:"true"
  });
  return `${base}?${p}`;
}

function showErr(msg) {
  const b = document.getElementById("err-banner");
  if (msg) { b.textContent = "❌ " + msg; b.classList.add("show"); }
  else { b.classList.remove("show"); }
}

function renderChannels(query) {
  if (!session) return;
  const q = (query || "").toLowerCase();
  const filtered = q
    ? CHANNELS.filter(([n, name]) => name.toLowerCase().includes(q) || String(n).includes(q))
    : CHANNELS;

  const groups = {};
  for (const ch of filtered) {
    const cat = ch[4];
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(ch);
  }

  const content = document.getElementById("content");
  content.innerHTML = "";

  if (filtered.length === 0) {
    content.innerHTML = `<div style="color:var(--muted);padding:40px;text-align:center">Nessun canale trovato</div>`;
    return;
  }

  for (const [cat, chs] of Object.entries(groups)) {
    const sec = document.createElement("div");
    sec.className = "category-section";

    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = cat;
    sec.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "ch-grid";

    for (const [num, name, chId, type] of chs) {
      const a = document.createElement("a");
      a.className = "ch-card";
      a.href = "#";
      a.target = "_blank";
      a.rel = "noopener";
      a.dataset.chId = chId;
      a.dataset.type = type;
      a.innerHTML = `
        <span class="ch-num">${num}</span>
        <span class="ch-info"><span class="ch-name">${name}</span></span>
        <span class="ch-badge">${type}</span>`;
      a.addEventListener("click", async function(e) {
        e.preventDefault();
        // Se la sessione non c'è o il JWT potrebbe essere scaduto, rinnova
        if (!session) {
          setStatus("loading", "Ottengo sessione...");
          try { session = await boot(); setStatus("ok", "Sessione attiva"); }
          catch(err) { setStatus("err", "Errore sessione"); showErr("Impossibile ottenere sessione: " + err.message); return; }
        }
        const url = buildUrl(this.dataset.chId, this.dataset.type, session);
        window.open(url, "_blank", "noopener");
      });
      grid.appendChild(a);
    }

    sec.appendChild(grid);
    content.appendChild(sec);
  }
}

async function refreshSession() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  setStatus("loading", "Rinnovo sessione...");
  showErr(null);
  try {
    session = await boot();
    setStatus("ok", "Sessione rinnovata ✓");
    renderChannels(document.getElementById("search").value);
    document.getElementById("tip").classList.add("show");
  } catch(e) {
    setStatus("err", "Errore");
    showErr("Impossibile rinnovare: " + e.message);
  }
  btn.disabled = false;
}

(async () => {
  try {
    session = await boot();
    setStatus("ok", "Sessione attiva");
    document.getElementById("refresh-btn").disabled = false;
    document.getElementById("tip").classList.add("show");
    renderChannels();
    // Rinnovo automatico ogni 30 minuti
    setInterval(async () => {
      try {
        session = await boot();
        setStatus("ok", "JWT rinnovato automaticamente ✓");
      } catch(e) {
        setStatus("err", "Rinnovo automatico fallito");
      }
    }, 30 * 60 * 1000);
  } catch(e) {
    setStatus("err", "Errore sessione");
    showErr("Impossibile ottenere la sessione: " + e.message + " — premi 🔄 Rinnova JWT per riprovare.");
    document.getElementById("content").innerHTML = "";
    document.getElementById("refresh-btn").disabled = false;
  }
})();
</script>
